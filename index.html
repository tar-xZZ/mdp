
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-mono, monospace); }
.pg { padding: 1.5rem 0; }
.card { background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.sub { font-size: 13px; color: var(--color-text-secondary); }
.pwd-box { background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 14px 16px; font-family: var(--font-mono); font-size: 15px; letter-spacing: 0.04em; color: var(--color-text-primary); word-break: break-all; line-height: 1.6; min-height: 56px; display: flex; align-items: center; gap: 12px; justify-content: space-between; margin: 1rem 0; }
.pwd-text { flex: 1; }
.copy-btn { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 12px; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: background 0.15s; }
.copy-btn:hover { background: var(--color-background-primary); color: var(--color-text-primary); }
.gen-btn { width: 100%; padding: 11px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-primary); border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s; }
.gen-btn:hover { background: var(--color-background-secondary); }
.row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.row label { font-size: 13px; color: var(--color-text-secondary); flex: 1; }
.row input[type=range] { flex: 2; }
.row .val { font-size: 13px; font-weight: 500; color: var(--color-text-primary); min-width: 28px; text-align: right; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
.opt { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 8px 10px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); transition: border-color 0.15s, background 0.15s; }
.opt.on { border-color: var(--color-border-secondary); background: var(--color-background-primary); }
.opt input { display: none; }
.opt-dot { width: 14px; height: 14px; border: 0.5px solid var(--color-border-secondary); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.opt.on .opt-dot { background: var(--color-text-primary); border-color: var(--color-text-primary); }
.opt.on .opt-dot::after { content: ''; display: block; width: 6px; height: 6px; border-radius: 1px; background: var(--color-background-primary); }
.opt-label { font-size: 12px; color: var(--color-text-secondary); }
.opt.on .opt-label { color: var(--color-text-primary); }
.custom-row { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; }
.custom-row label { font-size: 13px; color: var(--color-text-secondary); white-space: nowrap; }
.custom-row input[type=text] { flex: 1; font-family: var(--font-mono); font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); }
.metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.metric { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 10px 12px; }
.metric .mlabel { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
.metric .mval { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.metric .msub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.bar-wrap { margin: 12px 0 4px; }
.bar-bg { height: 6px; background: var(--color-background-primary); border-radius: 3px; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s, background-color 0.4s; }
.strength-label { font-size: 12px; color: var(--color-text-secondary); margin-top: 6px; }
.crack-full { grid-column: 1 / -1; }
.sep { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1rem 0; }
</style>

<div class="pg">
  <div style="margin-bottom:1rem;">
    <p class="title">Générateur de mot de passe</p>
    <p class="sub">Configurez, générez, analysez.</p>
  </div>

  <div class="card">
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;">Longueur</p>
    <div class="row">
      <input type="range" id="lenSlider" min="4" max="64" value="20" step="1" style="flex:1;">
      <span class="val" id="lenVal">20</span>
    </div>

    <hr class="sep">
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;">Jeu de caractères</p>
    <div class="options" id="opts">
      <label class="opt on" data-key="upper"><input type="checkbox" checked><div class="opt-dot"></div><span class="opt-label">Majuscules (A–Z)</span></label>
      <label class="opt on" data-key="lower"><input type="checkbox" checked><div class="opt-dot"></div><span class="opt-label">Minuscules (a–z)</span></label>
      <label class="opt on" data-key="digits"><input type="checkbox" checked><div class="opt-dot"></div><span class="opt-label">Chiffres (0–9)</span></label>
      <label class="opt" data-key="sym"><input type="checkbox"><div class="opt-dot"></div><span class="opt-label">Symboles (!@#…)</span></label>
      <label class="opt" data-key="minus"><input type="checkbox"><div class="opt-dot"></div><span class="opt-label">Tiret (-)</span></label>
      <label class="opt" data-key="under"><input type="checkbox"><div class="opt-dot"></div><span class="opt-label">Underscore (_)</span></label>
      <label class="opt" data-key="space"><input type="checkbox"><div class="opt-dot"></div><span class="opt-label">Espace ( )</span></label>
      <label class="opt" data-key="brackets"><input type="checkbox"><div class="opt-dot"></div><span class="opt-label">Crochets ([]{}<>)</span></label>
      <label class="opt" data-key="latin"><input type="checkbox"><div class="opt-dot"></div><span class="opt-label">Latin-1 (à é ü…)</span></label>
      <label class="opt" data-key="ambig"><input type="checkbox"><div class="opt-dot"></div><span class="opt-label">Ambigus (0O Il1)</span></label>
    </div>

    <div class="custom-row">
      <label>Caractères custom :</label>
      <input type="text" id="customChars" placeholder="ex: @€£¥">
    </div>

    <div class="pwd-box">
      <span class="pwd-text" id="pwdDisplay">—</span>
      <button class="copy-btn" id="copyBtn">Copier</button>
    </div>
    <button class="gen-btn" id="genBtn">Générer un nouveau mot de passe</button>
  </div>

  <div class="card">
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:10px;">Analyse de sécurité</p>
    <div class="bar-wrap">
      <div class="bar-bg"><div class="bar-fill" id="barFill" style="width:0%;"></div></div>
      <p class="strength-label" id="strengthLabel">—</p>
    </div>
    <hr class="sep" style="margin:10px 0;">
    <div class="metrics" id="metricsGrid">
      <div class="metric"><div class="mlabel">Entropie</div><div class="mval" id="mBits">—</div><div class="msub">bits</div></div>
      <div class="metric"><div class="mlabel">Taille de l'alphabet</div><div class="mval" id="mAlpha">—</div><div class="msub">caractères uniques</div></div>
      <div class="metric"><div class="mlabel">Combinaisons possibles</div><div class="mval" id="mComb">—</div><div class="msub">permutations</div></div>
      <div class="metric crack-full"><div class="mlabel">Temps pour craquer (attaque brute force)</div><div class="mval" id="mCrack">—</div><div class="msub" id="mCrackSub"></div></div>
    </div>
  </div>
</div>

<script>
const SETS = {
  upper:    'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower:    'abcdefghijklmnopqrstuvwxyz',
  digits:   '0123456789',
  sym:      '!@#$%^&*;:,.<>?/|~`"\'=+',
  minus:    '-',
  under:    '_',
  space:    ' ',
  brackets: '[]{}()<>',
  latin:    'àáâãäåæçèéêëìíîïðñòóôõöøùúûüýþÿ',
  ambig:    '0O1lI'
};

function getAlphabet() {
  let s = '';
  document.querySelectorAll('#opts .opt').forEach(el => {
    if (el.classList.contains('on')) s += SETS[el.dataset.key] || '';
  });
  const custom = document.getElementById('customChars').value;
  s += custom;
  return [...new Set(s.split(''))].join('');
}

function generate() {
  const len = parseInt(document.getElementById('lenSlider').value);
  const alpha = getAlphabet();
  if (!alpha.length) { document.getElementById('pwdDisplay').textContent = '⚠ Sélectionnez au moins un jeu'; return; }
  let pwd = '';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) pwd += alpha[arr[i] % alpha.length];
  document.getElementById('pwdDisplay').textContent = pwd;
  analyze(pwd, alpha.length);
}

function analyze(pwd, alphaSize) {
  const len = pwd.length;
  const entropy = len * Math.log2(alphaSize);
  const combExp = entropy;
  document.getElementById('mBits').textContent = Math.round(entropy);
  document.getElementById('mAlpha').textContent = alphaSize;

  let combStr;
  if (combExp < 53) {
    const n = Math.pow(2, combExp);
    combStr = n < 1e6 ? Math.round(n).toLocaleString('fr') : n.toExponential(2);
  } else {
    combStr = '2^' + Math.round(combExp);
  }
  document.getElementById('mComb').textContent = combStr;

  const pct = Math.min(100, (entropy / 128) * 100);
  const bar = document.getElementById('barFill');
  bar.style.width = pct.toFixed(1) + '%';
  let color, label;
  if (entropy < 28) { color = '#E24B4A'; label = 'Très faible — craquable en secondes'; }
  else if (entropy < 36) { color = '#EF9F27'; label = 'Faible — craquable rapidement'; }
  else if (entropy < 60) { color = '#BA7517'; label = 'Moyen — résiste quelques heures'; }
  else if (entropy < 80) { color = '#639922'; label = 'Bon — résiste des années'; }
  else if (entropy < 100) { color = '#1D9E75'; label = 'Fort — résiste des millénaires'; }
  else { color = '#7F77DD'; label = 'Exceptionnel — inattaquable en pratique'; }
  bar.style.backgroundColor = color;
  document.getElementById('strengthLabel').textContent = label;

  const guessPerSec = 1e12;
  const totalGuesses = Math.pow(2, entropy);
  const secsMid = totalGuesses / 2 / guessPerSec;
  document.getElementById('mCrack').textContent = formatTime(secsMid);
  document.getElementById('mCrackSub').textContent = '1 billion de tentatives/sec (GPU moderne), scénario moyen';
}

function formatTime(secs) {
  if (!isFinite(secs) || secs > 1e30) return '> âge de l\'univers ×10²⁰';
  if (secs < 1) return '< 1 seconde';
  if (secs < 60) return Math.round(secs) + ' sec';
  if (secs < 3600) return Math.round(secs/60) + ' min';
  if (secs < 86400) return Math.round(secs/3600) + ' h';
  if (secs < 365.25*86400) return Math.round(secs/86400) + ' jours';
  const yrs = secs / (365.25*86400);
  if (yrs < 1e3) return Math.round(yrs) + ' ans';
  if (yrs < 1e6) return (yrs/1e3).toFixed(1) + ' milliers d\'ans';
  if (yrs < 1e9) return (yrs/1e6).toFixed(1) + ' millions d\'ans';
  if (yrs < 1e12) return (yrs/1e9).toFixed(1) + ' milliards d\'ans';
  return '> ' + yrs.toExponential(1) + ' ans';
}

document.getElementById('lenSlider').addEventListener('input', function() {
  document.getElementById('lenVal').textContent = this.value;
  const pwd = document.getElementById('pwdDisplay').textContent;
  if (pwd && pwd !== '—') generate();
});

document.querySelectorAll('#opts .opt').forEach(el => {
  el.addEventListener('click', () => {
    el.classList.toggle('on');
    const cb = el.querySelector('input[type=checkbox]');
    cb.checked = el.classList.contains('on');
    const pwd = document.getElementById('pwdDisplay').textContent;
    if (pwd && pwd !== '—') generate();
  });
});

document.getElementById('customChars').addEventListener('input', () => {
  const pwd = document.getElementById('pwdDisplay').textContent;
  if (pwd && pwd !== '—') generate();
});

document.getElementById('genBtn').addEventListener('click', generate);

document.getElementById('copyBtn').addEventListener('click', () => {
  const txt = document.getElementById('pwdDisplay').textContent;
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier', 1500);
  });
});

generate();
</script>
